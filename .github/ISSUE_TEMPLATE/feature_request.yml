name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement", "copilot"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: |
        Describe the problem this feature would solve or the benefit it would provide.
        Example: "As a [type of user], I want to [action] so that [benefit]."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: |
        How do you envision this feature working? Include:
        - UI changes (if applicable)
        - Workflow changes
        - New settings or configuration options
        - Integration points with existing features

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there alternative approaches that could achieve the same goal? What are the trade-offs?

  - type: dropdown
    id: priority
    attributes:
      label: How important is this feature to you?
      options:
        - Nice to have
        - Would be helpful
        - Very important
        - Critical
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Willingness to Contribute
      options:
        - label: I'd be willing to implement this feature myself with guidance
        - label: I can help test this feature
        - label: I can provide feedback during development

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, mockups, or examples about the feature request.

  - type: textarea
    id: related
    attributes:
      label: Related Issues
      description: Are there any related issues or features? Link them here.

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Notes
      description: |
        Technical suggestions for implementation:
        - Which modules would need changes?
        - New dependencies required?
        - API changes needed?
